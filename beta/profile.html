<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo | AuraVerse</title>
    <link rel="icon" href="images/aura-nobg.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root {
            --accent: #F05BFF; --accent-soft: rgba(240,91,255,0.10); --accent-glow: rgba(240,91,255,0.22);
            --border-accent: rgba(240,91,255,0.25);
            --gradient: linear-gradient(135deg,#F05BFF,#7000FF);
            --gradient-text: linear-gradient(135deg,#F05BFF 0%,#a855f7 50%,#7000FF 100%);
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            --bg: #f2f2f7; --surface: #ffffff; --surface-2: rgba(0,0,0,0.033);
            --text: #1d1d1f; --text-muted: #6e6e73; --border: rgba(0,0,0,0.07);
            --shadow: 0 2px 16px rgba(0,0,0,0.06); --shadow-hover: 0 8px 32px rgba(0,0,0,0.10);
            --sidebar-bg: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b0b0e; --surface: rgba(18,18,22,0.95); --surface-2: rgba(255,255,255,0.04);
                --text: #f5f5f7; --text-muted: #a1a1a6; --border: rgba(255,255,255,0.07);
                --shadow: 0 2px 20px rgba(0,0,0,0.35); --shadow-hover: 0 8px 40px rgba(0,0,0,0.45);
                --sidebar-bg: rgba(12,12,16,0.98);
            }
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; min-height: 100vh; }
        body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: .5; }

        .app-layout { display: grid; grid-template-columns: 260px 1fr 300px; min-height: 100vh; max-width: 1280px; margin: 0 auto; position: relative; z-index: 1; }

        /* SIDEBAR */
        .sidebar-left { position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; padding: 24px 16px; background: var(--sidebar-bg); border-right: 1px solid var(--border); backdrop-filter: blur(24px); overflow-y: auto; }
        .logo-wrap { display: flex; align-items: center; gap: 10px; padding: 6px 12px 16px; text-decoration: none; }
        .logo-wrap img { width: 32px; height: 32px; border-radius: 8px; }
        .logo-name { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--text); }
        .logo-name span { background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .nav-links { display: flex; flex-direction: column; gap: 3px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 14px; text-decoration: none; color: var(--text-muted); font-weight: 500; font-size: .9rem; transition: var(--transition); border: 1px solid transparent; cursor: pointer; background: none; font-family: 'Poppins', sans-serif; width: 100%; text-align: left; }
        .nav-link i { width: 20px; text-align: center; font-size: 16px; }
        .nav-link:hover { background: var(--surface-2); color: var(--text); }
        .nav-link.active { background: var(--accent-soft); color: var(--accent); border-color: var(--border-accent); }
        .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 12px 4px; }
        .sidebar-user { margin-top: auto; display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface-2); cursor: pointer; transition: var(--transition); text-decoration: none; }
        .sidebar-user:hover { border-color: var(--border-accent); background: var(--accent-soft); }
        .sidebar-user img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); flex-shrink: 0; }
        .sidebar-user-info { flex: 1; min-width: 0; }
        .sidebar-user-name { font-weight: 700; font-size: .82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-user-handle { font-size: .72rem; color: var(--text-muted); }

        /* MAIN */
        .main-profile { border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: 100vh; }

        /* TOP BAR */
        .topbar { position: sticky; top: 0; background: var(--sidebar-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; z-index: 100; }
        .btn-back { width: 34px; height: 34px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: var(--transition); font-size: 13px; }
        .btn-back:hover { background: var(--accent-soft); color: var(--accent); }
        .topbar-info { line-height: 1.3; }
        .topbar-name { font-weight: 800; font-size: .95rem; display: flex; align-items: center; gap: 6px; }
        .topbar-posts { font-size: .7rem; color: var(--text-muted); }

        /* BANNER */
        .banner { height: 160px; background: var(--gradient); position: relative; overflow: hidden; }
        .banner::before { content: ''; position: absolute; inset: 0; opacity: .08; background: repeating-linear-gradient(45deg, white 0, white 1px, transparent 0, transparent 50%) 0/12px 12px; }

        /* PROFILE HEADER */
        .profile-header { padding: 0 20px 20px; border-bottom: 1px solid var(--border); }
        .avatar-action-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: -44px; margin-bottom: 14px; }
        .avatar-wrap { position: relative; }
        .profile-avatar { width: 88px; height: 88px; border-radius: 50%; object-fit: cover; border: 4px solid var(--bg); background: var(--surface); display: block; }
        .avatar-ring { position: absolute; inset: -4px; border-radius: 50%; border: 2.5px solid transparent; background: var(--gradient) border-box; -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: destination-out; mask-composite: exclude; pointer-events: none; }
        .profile-actions { display: flex; gap: 8px; align-items: center; }
        .btn-follow-main { padding: 9px 22px; border-radius: 50px; background: var(--text); color: var(--bg); border: none; font-weight: 800; font-size: .875rem; cursor: pointer; font-family: 'Poppins', sans-serif; transition: var(--transition); }
        .btn-follow-main:hover { opacity: .85; }
        .btn-follow-main.following { background: none; color: var(--text); border: 1.5px solid var(--border); }
        .btn-follow-main.following:hover { border-color: #ff6b6b; color: #ff6b6b; }
        .btn-edit-main { padding: 9px 22px; border-radius: 50px; border: 1.5px solid var(--border); background: none; color: var(--text); font-weight: 700; font-size: .875rem; cursor: pointer; font-family: 'Poppins', sans-serif; transition: var(--transition); }
        .btn-edit-main:hover { border-color: var(--border-accent); background: var(--accent-soft); color: var(--accent); }

        .profile-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
        .profile-name { font-size: 1.25rem; font-weight: 900; letter-spacing: -.02em; }
        .verified-badge { color: var(--accent); font-size: 18px; }

        /* BADGE PILL */
        .badge-pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 50px; font-size: .7rem; font-weight: 700; background: var(--accent-soft); color: var(--accent); border: 1px solid var(--border-accent); }

        .profile-handle { font-size: .875rem; color: var(--text-muted); margin-bottom: 10px; }
        .profile-bio { font-size: .9rem; line-height: 1.6; margin-bottom: 12px; font-weight: 300; max-width: 480px; }
        .profile-meta { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 14px; font-size: .78rem; color: var(--text-muted); }
        .profile-meta span { display: flex; align-items: center; gap: 5px; }
        .profile-meta i { color: var(--accent); }
        .profile-stats { display: flex; gap: 22px; font-size: .875rem; }
        .pstat { cursor: pointer; }
        .pstat strong { font-weight: 800; margin-right: 3px; }
        .pstat span { color: var(--text-muted); }
        .pstat:hover strong { color: var(--accent); }

        /* TABS */
        .profile-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .profile-tab { flex: 1; padding: 14px; text-align: center; font-weight: 600; font-size: .82rem; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: var(--transition); border: none; background: none; font-family: 'Poppins', sans-serif; }
        .profile-tab.active { color: var(--text); border-bottom: 2px solid var(--accent); }
        .profile-tab:hover:not(.active) { background: var(--surface-2); }

        /* POSTS */
        .feed-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--text-muted); }
        .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .post-card { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 14px; cursor: pointer; transition: background .2s; animation: fadeUp .35s ease both; }
        .post-card:hover { background: var(--surface-2); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .post-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); flex-shrink: 0; }
        .post-body { flex: 1; min-width: 0; }
        .post-header { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; flex-wrap: wrap; }
        .post-name { font-weight: 700; font-size: .9rem; display: flex; align-items: center; gap: 4px; }
        .post-handle { color: var(--text-muted); font-size: .82rem; }
        .post-time { color: var(--text-muted); font-size: .82rem; margin-left: auto; }
        .post-content { font-size: .935rem; line-height: 1.65; margin-bottom: 12px; word-break: break-word; }
        .post-content .hashtag { color: var(--accent); font-weight: 500; }
        .post-content .mention { color: var(--accent); font-weight: 500; }
        .post-actions { display: flex; gap: 2px; margin-left: -8px; }
        .post-action { display: flex; align-items: center; gap: 5px; padding: 6px 10px; border-radius: 50px; border: none; background: none; color: var(--text-muted); font-size: .8rem; font-weight: 500; font-family: 'Poppins', sans-serif; cursor: pointer; transition: var(--transition); }
        .post-action i { font-size: 14px; }
        .post-action:hover { background: var(--accent-soft); color: var(--accent); }
        .post-action.liked { color: #ff3b30; }
        .post-action.danger { color: #ff6b6b; }

        /* EMPTY */
        .empty-state { text-align: center; padding: 60px 32px; }
        .empty-state-icon { font-size: 2.8rem; margin-bottom: 16px; display: block; background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .empty-state h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; }
        .empty-state p { font-size: .875rem; color: var(--text-muted); font-weight: 300; }

        /* RIGHT SIDEBAR */
        .sidebar-right { position: sticky; top: 0; height: 100vh; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
        .widget-r { background: var(--surface); border-radius: 20px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .widget-r-title { font-size: .95rem; font-weight: 800; margin-bottom: 14px; }

        /* FOLLOW ITEM */
        .follow-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
        .follow-item img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
        .follow-info { flex: 1; min-width: 0; }
        .follow-name { font-weight: 700; font-size: .82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
        .follow-handle { font-size: .72rem; color: var(--text-muted); }
        .btn-follow { padding: 6px 14px; border-radius: 50px; border: 1.5px solid var(--border-accent); background: none; color: var(--accent); font-weight: 700; font-size: .72rem; cursor: pointer; font-family: 'Poppins', sans-serif; transition: var(--transition); }
        .btn-follow:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-follow.following { background: var(--accent-soft); }

        /* TOAST */
        .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: 12px 24px; font-size: .875rem; font-weight: 600; box-shadow: 0 16px 48px rgba(0,0,0,.2); z-index: 9999; display: flex; align-items: center; gap: 10px; transition: transform .4s cubic-bezier(0.34,1.56,0.64,1), opacity .3s; opacity: 0; white-space: nowrap; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(48,209,88,.3); } .toast.success i { color: #30d158; }
        .toast.error { border-color: rgba(255,107,107,.3); } .toast.error i { color: #ff6b6b; }

        @media (max-width: 1100px) {
            .app-layout { grid-template-columns: 72px 1fr 0; }
            .sidebar-right { display: none; }
            .logo-name, .nav-link span, .sidebar-user-info { display: none; }
            .logo-wrap img { width: 36px; height: 36px; }
            .logo-wrap { justify-content: center; padding: 6px; }
            .nav-link { justify-content: center; padding: 13px; }
        }
        @media (max-width: 768px) {
            .app-layout { grid-template-columns: 1fr; }
            .sidebar-left { position: fixed; bottom: 0; left: 0; right: 0; top: auto; height: auto; flex-direction: row; padding: 8px 16px; z-index: 400; border-top: 1px solid var(--border); border-right: none; justify-content: space-around; }
            .logo-wrap, .sidebar-divider, .sidebar-user { display: none; }
            .nav-links { flex-direction: row; }
            .nav-link span { display: none; }
            .main-profile { border: none; }
            body { padding-bottom: 68px; }
        }
    </style>
</head>
<body>
<div class="app-layout">

    <!-- SIDEBAR LEFT -->
    <nav class="sidebar-left">
        <a href="dashboard.html" class="logo-wrap">
            <img src="images/aura-nobg.png" alt="Aura">
            <span class="logo-name">Aura<span>Verse</span></span>
        </a>
        <div class="nav-links">
            <a class="nav-link" href="dashboard.html"><i class="fa-solid fa-house"></i> <span>Home</span></a>
            <a class="nav-link" href="dashboard.html"><i class="fa-solid fa-magnifying-glass"></i> <span>Esplora</span></a>
            <button class="nav-link" onclick="window.location.href='notifications.html'"><i class="fa-solid fa-bell"></i> <span>Notifiche</span></button>
            <button class="nav-link active"><i class="fa-solid fa-user"></i> <span>Profilo</span></button>
            <hr class="sidebar-divider" style="width:100%">
            <a class="nav-link" href="account.html"><i class="fa-solid fa-gear"></i> <span>Impostazioni</span></a>
        </div>
        <a class="sidebar-user" href="dashboard.html">
            <img id="sidebar-avatar" src="images/default.png" alt="">
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebar-name">...</div>
                <div class="sidebar-user-handle" id="sidebar-handle">@...</div>
            </div>
        </a>
    </nav>

    <!-- MAIN PROFILE -->
    <main class="main-profile">
        <div class="topbar">
            <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="topbar-info">
                <div class="topbar-name" id="topbar-name">
                    <span id="topbar-name-text">Caricamento...</span>
                </div>
                <div class="topbar-posts" id="topbar-posts">0 post</div>
            </div>
        </div>

        <div class="banner" id="banner"></div>

        <div class="profile-header">
            <div class="avatar-action-row">
                <div class="avatar-wrap">
                    <img class="profile-avatar" id="profile-avatar" src="images/default.png" onerror="this.src='images/default.png'" alt="">
                    <div class="avatar-ring"></div>
                </div>
                <div class="profile-actions" id="profile-actions"></div>
            </div>

            <div class="profile-name-row">
                <div class="profile-name" id="profile-name">—</div>
                <span id="verified-icon"></span>
                <span id="badge-pill"></span>
            </div>
            <div class="profile-handle" id="profile-handle">@—</div>
            <div class="profile-bio" id="profile-bio"></div>
            <div class="profile-meta">
                <span><i class="fa-regular fa-calendar"></i> <span id="joined-date">—</span></span>
            </div>
            <div class="profile-stats">
                <div class="pstat"><strong id="stat-following">0</strong><span>Seguiti</span></div>
                <div class="pstat"><strong id="stat-followers">0</strong><span>Follower</span></div>
                <div class="pstat"><strong id="stat-posts">0</strong><span>Post</span></div>
            </div>
        </div>

        <div class="profile-tabs">
            <button class="profile-tab active" onclick="loadTab('posts',this)">Post</button>
            <button class="profile-tab" onclick="loadTab('likes',this)">Mi piace</button>
        </div>

        <div id="posts-container">
            <div class="feed-loading"><div class="spinner"></div><span>Caricamento...</span></div>
        </div>
    </main>

    <!-- RIGHT SIDEBAR -->
    <aside class="sidebar-right">
        <div class="widget-r">
            <div class="widget-r-title">✨ Potrebbe piacerti</div>
            <div id="suggested-list"><div style="color:var(--text-muted);font-size:.82rem;">Caricamento...</div></div>
        </div>
    </aside>
</div>

<div class="toast" id="toast"><i id="toast-icon" class="fa-solid fa-check"></i><span id="toast-msg"></span></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDsrHAtIh5bsYDHa1wz0LMcmciChAoRikU",
    authDomain: "myauraid-f03c6.firebaseapp.com",
    projectId: "myauraid-f03c6",
    storageBucket: "myauraid-f03c6.appspot.com",
    messagingSenderId: "190478237725",
    appId: "1:190478237725:web:0d39907473f511b85a06f4"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const FieldValue = firebase.firestore.FieldValue;

let me = null;
let myData = {};
let myUsername = null;
let myFollowing = new Set();
let profileUID = null;
let profileData = {};
let profileUsername = null;
let isOwnProfile = false;
let isFollowing = false;
let profileVerified = false;
let postCount = 0;

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function fmtContent(t) {
    return esc(t)
        .replace(/(#[\w\u00C0-\u017E]+)/g,'<span class="hashtag">$1</span>')
        .replace(/(@\w+)/g,'<span class="mention">$1</span>')
        .replace(/\n/g,'<br>');
}
function fmtTime(date) {
    if (!date) return '';
    const now = new Date(); const d = date.toDate ? date.toDate() : new Date(date);
    const s = Math.floor((now-d)/1000);
    if (s < 60) return s+'s'; if (s < 3600) return Math.floor(s/60)+'m';
    if (s < 86400) return Math.floor(s/3600)+'h';
    return d.toLocaleDateString('it-IT',{day:'numeric',month:'short'});
}

let toastTimer;
function toast(msg, type='success') {
    const el = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    document.getElementById('toast-icon').className = type==='success' ? 'fa-solid fa-check' : 'fa-solid fa-xmark';
    el.className = 'toast '+type+' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>el.classList.remove('show'), 3200);
}

const urlParams = new URLSearchParams(window.location.search);
profileUsername = urlParams.get('user');

auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'index.html'; return; }
    me = user;
    try {
        const snap = await db.collection('users').doc(user.uid).get();
        if (snap.exists) myData = snap.data();
        const nSnap = await db.collection('nicknames').where('uid','==',user.uid).limit(1).get();
        if (!nSnap.empty) myUsername = nSnap.docs[0].id;
        setupMySidebar();
        // Load my following list
        const fSnap = await db.collection('users').doc(me.uid).collection('verse').get();
        fSnap.forEach(d => myFollowing.add(d.id));
    } catch(e) {}
    await resolveProfile();
    loadSuggested();
});

function setupMySidebar() {
    const name = `${myData.nome||''} ${myData.cognome||''}`.trim() || 'Utente Aura';
    document.getElementById('sidebar-name').textContent = name;
    document.getElementById('sidebar-handle').textContent = myUsername ? `@${myUsername}` : '—';
    document.getElementById('sidebar-avatar').src = myData.profileImage || 'images/default.png';
}

async function resolveProfile() {
    if (!profileUsername) { showError('Nessun profilo specificato.'); return; }
    try {
        const nSnap = await db.collection('nicknames').doc(profileUsername).get();
        if (!nSnap.exists) { showError('Utente @' + profileUsername + ' non trovato.'); return; }
        profileUID = nSnap.data().uid;
        isOwnProfile = profileUID === me?.uid;
        const [uSnap, vSnap] = await Promise.all([
            db.collection('users').doc(profileUID).get(),
            db.collection('users').doc(profileUID).collection('verse').doc('verified').get()
        ]);
        if (!uSnap.exists) { showError('Profilo non trovato.'); return; }
        profileData = uSnap.data();
        profileVerified = vSnap.exists && vSnap.data().verified === true;
        await renderProfileHeader();
        loadTab('posts', document.querySelector('.profile-tab.active'));
    } catch(e) { showError('Errore: ' + e.message); }
}

async function renderProfileHeader() {
    const d = profileData;
    const name = `${d.nome||''} ${d.cognome||''}`.trim() || 'Utente Aura';
    const bio = d.bio?.description || '';
    const avatar = d.profileImage || 'images/default.png';
    const badge = d.badge || null;

    document.title = `@${profileUsername} | AuraVerse`;
    document.getElementById('topbar-name-text').textContent = name;
    document.getElementById('profile-name').textContent = name;
    document.getElementById('profile-handle').textContent = `@${profileUsername}`;
    document.getElementById('profile-bio').textContent = bio;
    document.getElementById('profile-avatar').src = avatar;

    // Verified icon
    if (profileVerified) {
        document.getElementById('verified-icon').innerHTML = '<i class="fa-solid fa-circle-check verified-badge" title="Account verificato"></i>';
        document.getElementById('topbar-name-text').insertAdjacentHTML('afterend', ' <i class="fa-solid fa-circle-check verified-badge" style="font-size:15px;"></i>');
    }

    // Badge pill
    if (badge) {
        document.getElementById('badge-pill').innerHTML = `<span class="badge-pill"><i class="fa-solid fa-star"></i> ${esc(badge)}</span>`;
    }

    // Joined date
    if (d.createdAt) {
        const dt = d.createdAt.toDate ? d.createdAt.toDate() : new Date(d.createdAt);
        document.getElementById('joined-date').textContent = 'Iscritto ' + dt.toLocaleDateString('it-IT',{month:'long',year:'numeric'});
    }

    // Following count (people this profile follows)
    const followingSnap = await db.collection('users').doc(profileUID).collection('verse').get();
    document.getElementById('stat-following').textContent = followingSnap.size;

    // Followers count: count users whose 'verse' subcollection contains profileUID doc
    // This requires a collection group query – simplified: count from a counter or skip
    // We'll store a followerCount field updated on follow/unfollow
    document.getElementById('stat-followers').textContent = d.followerCount || 0;

    // Posts count
    const pSnap = await db.collection('verse').where('proprietario','==',profileUID).get();
    postCount = pSnap.size;
    document.getElementById('stat-posts').textContent = postCount;
    document.getElementById('topbar-posts').textContent = postCount + ' post';

    // Actions
    const actEl = document.getElementById('profile-actions');
    if (isOwnProfile) {
        actEl.innerHTML = `<button class="btn-edit-main" onclick="window.location.href='account.html'"><i class="fa-solid fa-pen"></i> Modifica profilo</button>`;
    } else {
        // Check if we follow this person
        isFollowing = myFollowing.has(profileUID);
        actEl.innerHTML = `<button class="btn-follow-main ${isFollowing?'following':''}" id="btn-follow-main" onclick="toggleFollow()">${isFollowing ? 'Seguito ✓' : 'Segui'}</button>`;
    }
}

async function toggleFollow() {
    if (!me || isOwnProfile) return;
    const btn = document.getElementById('btn-follow-main');
    const ref = db.collection('users').doc(me.uid).collection('verse').doc(profileUID);

    if (isFollowing) {
        await ref.delete();
        // Decrement target followerCount
        await db.collection('users').doc(profileUID).update({ followerCount: FieldValue.increment(-1) });
        isFollowing = false;
        myFollowing.delete(profileUID);
        btn.textContent = 'Segui';
        btn.classList.remove('following');
        const cur = parseInt(document.getElementById('stat-followers').textContent) || 0;
        document.getElementById('stat-followers').textContent = Math.max(0, cur - 1);
        toast(`Non segui più @${profileUsername}`, 'success');
    } else {
        await ref.set({ followedAt: FieldValue.serverTimestamp(), uid: profileUID });
        // Increment target followerCount
        await db.collection('users').doc(profileUID).update({ followerCount: FieldValue.increment(1) });
        isFollowing = true;
        myFollowing.add(profileUID);
        btn.textContent = 'Seguito ✓';
        btn.classList.add('following');
        const cur = parseInt(document.getElementById('stat-followers').textContent) || 0;
        document.getElementById('stat-followers').textContent = cur + 1;
        toast(`Ora segui @${profileUsername} 👋`, 'success');
    }
}

async function loadTab(tab, btn) {
    document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
    if (btn) btn.classList.add('active');
    const c = document.getElementById('posts-container');
    c.innerHTML = '<div class="feed-loading"><div class="spinner"></div><span>Caricamento...</span></div>';
    try {
        let snap;
        if (tab === 'posts') {
            snap = await db.collection('verse').where('proprietario','==',profileUID).orderBy('timestamp','desc').limit(40).get();
        } else {
            // Likes: get likes subcolleciton docs where uid == profileUID via collectionGroup
            snap = await db.collectionGroup('likes').where('uid','==',profileUID).limit(20).get();
            if (snap.empty) {
                c.innerHTML = emptyState('fa-heart','Nessun mi piace', isOwnProfile ? 'Non hai ancora messo mi piace.' : `@${profileUsername} non ha ancora messo mi piace.`);
                return;
            }
            // Get the parent posts
            const postDocs = await Promise.all(snap.docs.map(d => d.ref.parent.parent.get()));
            c.innerHTML = '';
            postDocs.forEach(doc => { if (doc.exists) c.appendChild(buildCard({id:doc.id,...doc.data()})); });
            return;
        }

        c.innerHTML = '';
        if (snap.empty) {
            c.innerHTML = emptyState('fa-feather-pointed','Nessun post', isOwnProfile ? 'Non hai ancora pubblicato nulla.' : `@${profileUsername} non ha ancora pubblicato nulla.`);
            return;
        }
        snap.forEach(doc => c.appendChild(buildCard({id:doc.id,...doc.data()})));
    } catch(e) {
        c.innerHTML = emptyState('fa-circle-exclamation','Errore',e.message);
    }
}

function buildCard(data) {
    const div = document.createElement('div');
    div.className = 'post-card';
    const avatar = data.authorAvatar || 'images/default.png';
    const name = esc(data.authorName||'Utente Aura');
    const handle = esc(data.username||'anonimo');
    const time = fmtTime(data.timestamp);
    const isOwn = data.proprietario === me?.uid;

    div.innerHTML = `
        <img class="post-avatar" src="${avatar}" onerror="this.src='images/default.png'" alt="">
        <div class="post-body">
            <div class="post-header">
                <div class="post-name">${name} ${profileVerified && data.proprietario===profileUID ? '<i class="fa-solid fa-circle-check" style="color:var(--accent);font-size:12px;"></i>' : ''}</div>
                <span class="post-handle">@${handle}</span>
                <span class="post-time">${time}</span>
            </div>
            <div class="post-content">${fmtContent(data.contenuto||'')}</div>
            <div class="post-actions">
                <button class="post-action" onclick="event.stopPropagation()"><i class="fa-regular fa-comment"></i> ${data.commentsCount||0}</button>
                <button class="post-action" id="lk-${data.id}" onclick="event.stopPropagation();likePost('${data.id}',this)"><i class="fa-regular fa-heart"></i> <span id="lkc-${data.id}">${data.likesCount||0}</span></button>
                <button class="post-action" onclick="event.stopPropagation();copyLink('${data.id}')"><i class="fa-solid fa-arrow-up-from-bracket"></i></button>
                ${isOwn ? `<button class="post-action danger" onclick="event.stopPropagation();deletePost('${data.id}')"><i class="fa-solid fa-trash"></i></button>` : ''}
            </div>
        </div>`;

    checkLike(data.id);
    div.addEventListener('click', () => window.location.href = `dashboard.html?post=${data.id}`);
    return div;
}

async function checkLike(postId) {
    if (!me) return;
    try {
        const snap = await db.collection('verse').doc(postId).collection('likes').doc(me.uid).get();
        if (snap.exists) {
            const btn = document.getElementById('lk-' + postId);
            if (btn) { btn.classList.add('liked'); btn.querySelector('i').className = 'fa-solid fa-heart'; }
        }
    } catch(e) {}
}

async function likePost(postId, btn) {
    if (!me) return;
    const likeRef = db.collection('verse').doc(postId).collection('likes').doc(me.uid);
    const postRef = db.collection('verse').doc(postId);
    const countEl = document.getElementById('lkc-' + postId);
    const snap = await likeRef.get();
    let count = parseInt(countEl?.textContent)||0;
    if (snap.exists) {
        await likeRef.delete();
        await postRef.update({ likesCount: FieldValue.increment(-1) });
        btn.classList.remove('liked');
        btn.querySelector('i').className = 'fa-regular fa-heart';
        if (countEl) countEl.textContent = Math.max(0,count-1);
    } else {
        await likeRef.set({ uid: me.uid, ts: FieldValue.serverTimestamp() });
        await postRef.update({ likesCount: FieldValue.increment(1) });
        btn.classList.add('liked');
        btn.querySelector('i').className = 'fa-solid fa-heart';
        if (countEl) countEl.textContent = count+1;
    }
}

async function deletePost(postId) {
    if (!confirm('Eliminare questo post?')) return;
    await db.collection('verse').doc(postId).delete();
    toast('Post eliminato','success');
    loadTab('posts', document.querySelector('.profile-tab.active'));
}

function copyLink(postId) {
    navigator.clipboard.writeText(`${location.origin}/dashboard.html?post=${postId}`);
    toast('Link copiato!','success');
}

function emptyState(icon,title,desc) {
    return `<div class="empty-state"><span class="empty-state-icon"><i class="fa-solid ${icon}"></i></span><h3>${title}</h3><p>${desc}</p></div>`;
}

function showError(msg) {
    document.getElementById('profile-name').textContent = 'Errore';
    document.getElementById('posts-container').innerHTML = emptyState('fa-circle-exclamation',msg,'');
}

async function loadSuggested() {
    const list = document.getElementById('suggested-list');
    try {
        const snap = await db.collection('users').limit(6).get();
        list.innerHTML = '';
        const users = [];
        snap.forEach(doc => { if (doc.id !== me?.uid && doc.id !== profileUID) users.push({uid:doc.id,...doc.data()}); });
        if (!users.length) { list.innerHTML = '<div style="color:var(--text-muted);font-size:.82rem;text-align:center;padding:10px;">Nessun suggerimento</div>'; return; }
        users.slice(0,4).forEach(u => {
            const name = `${u.nome||''} ${u.cognome||''}`.trim() || 'Utente Aura';
            const handle = u.username || u.uid.slice(0,8);
            const avatar = u.profileImage || 'images/default.png';
            const item = document.createElement('div');
            item.className = 'follow-item';
            item.innerHTML = `
                <img src="${avatar}" onerror="this.src='images/default.png'">
                <div class="follow-info">
                    <div class="follow-name"><a href="profile.html?user=${esc(handle)}" style="color:var(--text);text-decoration:none;">${esc(name)}</a></div>
                    <div class="follow-handle">@${esc(handle)}</div>
                </div>
                <button class="btn-follow ${myFollowing.has(u.uid)?'following':''}" onclick="followFromSidebar('${u.uid}','${esc(handle)}',this)">${myFollowing.has(u.uid)?'Seguito ✓':'Segui'}</button>`;
            list.appendChild(item);
        });
    } catch(e) {}
}

async function followFromSidebar(uid, handle, btn) {
    if (!me) return;
    const ref = db.collection('users').doc(me.uid).collection('verse').doc(uid);
    if (myFollowing.has(uid)) {
        await ref.delete();
        await db.collection('users').doc(uid).update({ followerCount: FieldValue.increment(-1) });
        myFollowing.delete(uid);
        btn.textContent = 'Segui';
        btn.classList.remove('following');
        toast(`Non segui più @${handle}`,'success');
    } else {
        await ref.set({ followedAt: FieldValue.serverTimestamp(), uid });
        await db.collection('users').doc(uid).update({ followerCount: FieldValue.increment(1) });
        myFollowing.add(uid);
        btn.textContent = 'Seguito ✓';
        btn.classList.add('following');
        toast(`Ora segui @${handle} 👋`,'success');
    }
}
</script>
